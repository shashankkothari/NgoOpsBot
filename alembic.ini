# =============================================================================
# NGO OpsBot — Alembic configuration
# =============================================================================
# This file is read by `alembic` CLI. The database URL is intentionally left
# blank here; it is read at runtime from the DATABASE_URL environment variable
# inside alembic/env.py.  The SYNC_DATABASE_URL (psycopg2 scheme) is used
# because Alembic's default runner is synchronous.
# =============================================================================

[alembic]
# Path to migration scripts (relative to this ini file)
script_location = alembic

# Template used for generating new migration files
file_template = %%(year)d%%(month)02d%%(day)02d_%%(hour)02d%%(minute)02d_%%(rev)s_%%(slug)s

# Timezone for the timestamp in generated filenames
timezone = UTC

# Max length for the slug portion of generated filenames
truncate_slug_length = 40

# sqlalchemy.url is intentionally empty — set dynamically in env.py via
# SYNC_DATABASE_URL environment variable.
sqlalchemy.url =

# ---------------------------------------------------------------------------
# Logging configuration
# ---------------------------------------------------------------------------
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine
# Set level to INFO to log SQL statements during migrations (verbose)

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
