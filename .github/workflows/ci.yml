name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Backend — Lint & Type Check
  # ---------------------------------------------------------------------------
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: ruff lint
        run: ruff check app/ tests/

      - name: ruff format check
        run: ruff format --check app/ tests/

      - name: mypy type check
        run: mypy app/ --ignore-missing-imports

  # ---------------------------------------------------------------------------
  # Backend — Tests
  # ---------------------------------------------------------------------------
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ngoopsbot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ngoopsbot_test
      TEST_REDIS_URL: redis://localhost:6379/1
      ASYNCIO_MODE: auto
      # Dummy values so Settings() doesn't fail on startup
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ngoopsbot_test
      REDIS_URL: redis://localhost:6379/1
      SECRET_KEY: ci-secret-key-not-for-production
      ENCRYPTION_KEY: Zm9vYmFyYmF6cXV4cXV4Zm9vYmFyYmF6cXV4cXV4Zm8=
      ADMIN_API_KEY: ci-admin-key
      WEBHOOK_SECRET: ci-webhook-secret
      APP_BASE_URL: http://localhost:8000
      ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: |
          pytest tests/ -x \
            --cov=app \
            --cov-report=xml \
            --cov-fail-under=60

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ---------------------------------------------------------------------------
  # Backend — Security Audit
  # ---------------------------------------------------------------------------
  backend-security:
    name: Backend Security Audit
    runs-on: ubuntu-latest
    # Runs independently — does not block on lint failure

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" pip-audit bandit

      - name: pip-audit (fail on HIGH/CRITICAL CVEs)
        run: |
          pip-audit --severity high --desc on

      - name: bandit static analysis (medium+ severity)
        run: |
          bandit -r app/ -ll -x tests/

  # ---------------------------------------------------------------------------
  # Dashboard — Lint & Type Check
  # ---------------------------------------------------------------------------
  dashboard-lint:
    name: Dashboard Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: ESLint (next lint)
        working-directory: dashboard
        run: npm run lint

      - name: TypeScript type check
        working-directory: dashboard
        run: npx tsc --noEmit

  # ---------------------------------------------------------------------------
  # Dashboard — Build
  # ---------------------------------------------------------------------------
  dashboard-build:
    name: Dashboard Build
    runs-on: ubuntu-latest
    needs: dashboard-lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build Next.js app
        working-directory: dashboard
        run: npm run build
        env:
          # Provide placeholder env vars so the build doesn't fail without secrets
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ---------------------------------------------------------------------------
  # Gate — all checks must pass
  # ---------------------------------------------------------------------------
  all-green:
    name: All Checks Passed
    needs: [backend-test, backend-security, dashboard-build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [[ "${{ needs.backend-test.result }}" != "success" || \
                "${{ needs.backend-security.result }}" != "success" || \
                "${{ needs.dashboard-build.result }}" != "success" ]]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All checks passed."
